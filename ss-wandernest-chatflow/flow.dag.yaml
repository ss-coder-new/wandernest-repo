$schema: https://azuremlschemas.azureedge.net/promptflow/latest/Flow.schema.json
environment:
  python_requirements_txt: requirements.txt
inputs:
  chat_history:
    type: list
    is_chat_history: true
    default: []
  question:
    type: string
    is_chat_input: true
    default: ""
outputs:
  answer:
    type: string
    reference: ${chat.output}
    is_chat_output: true
nodes:
- name: chat
  type: llm
  source:
    type: code
    path: chat.jinja2
  inputs:
    deployment_name: " gpt-5-mini-ss-wandernest"
    temperature: 1
    question: ${inputs.question}
    contexts: ${retreival.output}
  connection: ss-azure-oai-connection-wandernest
  api: chat
- name: retreival
  type: python
  source:
    type: code
    path: retreival.py
  inputs:
    search_connection: ss-azure-aisearch-connection
    query: ${inputs.question}
    index_name: ss-rag-wandernest2
